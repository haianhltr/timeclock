apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  template:
    spec:
      initContainers:
        - name: prisma-migrate
          image: ghcr.io/haianhltr/timeclock:bfd48d114fa06074fbdef1414ca2642b1d2f8635-migrator
      containers:
        - name: frontend
          image: ghcr.io/haianhltr/timeclock:bfd48d114fa06074fbdef1414ca2642b1d2f8635
          env:
            - name: NEXTAUTH_URL
              value: "https://clockin.randomstuffs.org"
