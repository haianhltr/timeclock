apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  template:
    spec:
      initContainers:
        - name: prisma-migrate
          image: ghcr.io/haianhltr/timeclock:e50ef219f1136b557d4491fc64db35a97e2806fa-migrator
      containers:
        - name: frontend
          image: ghcr.io/haianhltr/timeclock:e50ef219f1136b557d4491fc64db35a97e2806fa
          env:
            - name: NEXTAUTH_URL
              value: "https://clockin.randomstuffs.org"
