apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  template:
    spec:
      initContainers:
        - name: prisma-migrate
          image: ghcr.io/haianhltr/timeclock:b80676eccf26dc851c9e0bdcbbc300764b6c1971-migrator
      containers:
        - name: frontend
          image: ghcr.io/haianhltr/timeclock:b80676eccf26dc851c9e0bdcbbc300764b6c1971
          env:
            - name: NEXTAUTH_URL
              value: "https://clockin.randomstuffs.org"
