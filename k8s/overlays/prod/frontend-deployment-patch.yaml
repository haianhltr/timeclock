apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  template:
    spec:
      initContainers:
        - name: prisma-migrate
          image: ghcr.io/haianhltr/timeclock:f1777403590d8b1457f737c853f40eb54013433e-migrator
      containers:
        - name: frontend
          image: ghcr.io/haianhltr/timeclock:f1777403590d8b1457f737c853f40eb54013433e
          env:
            - name: NEXTAUTH_URL
              value: "https://clockin.randomstuffs.org"
