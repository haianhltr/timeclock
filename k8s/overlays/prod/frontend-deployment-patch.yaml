apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  template:
    spec:
      initContainers:
        - name: prisma-migrate
          image: ghcr.io/haianhltr/timeclock:63cc10b545f93798816d51d9b956f1544e62cc32-migrator
      containers:
        - name: frontend
          image: ghcr.io/haianhltr/timeclock:63cc10b545f93798816d51d9b956f1544e62cc32
          env:
            - name: NEXTAUTH_URL
              value: "https://clockin.randomstuffs.org"
