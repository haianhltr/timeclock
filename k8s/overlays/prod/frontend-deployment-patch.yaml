apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  template:
    spec:
      initContainers:
        - name: prisma-migrate
          image: ghcr.io/haianhltr/timeclock:80053f11395f033c35ddabfc11ae4b43cafc0255-migrator
      containers:
        - name: frontend
          image: ghcr.io/haianhltr/timeclock:80053f11395f033c35ddabfc11ae4b43cafc0255
          env:
            - name: NEXTAUTH_URL
              value: "https://clockin.randomstuffs.org"
