apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  template:
    spec:
      initContainers:
        - name: prisma-migrate
          image: ghcr.io/haianhltr/timeclock:8f5d401daae3e79d5bed644f79b8f93109432b6e-migrator
      containers:
        - name: frontend
          image: ghcr.io/haianhltr/timeclock:8f5d401daae3e79d5bed644f79b8f93109432b6e
          env:
            - name: NEXTAUTH_URL
              value: "https://clockin.randomstuffs.org"
