apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  template:
    spec:
      initContainers:
        - name: prisma-migrate
          image: ghcr.io/haianhltr/timeclock:9b1b2a218f1b0324bedb248e12c01ee894420ae9-migrator
      containers:
        - name: frontend
          image: ghcr.io/haianhltr/timeclock:9b1b2a218f1b0324bedb248e12c01ee894420ae9
          env:
            - name: NEXTAUTH_URL
              value: "https://clockin.randomstuffs.org"
