apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  template:
    spec:
      initContainers:
        - name: prisma-migrate
          image: ghcr.io/haianhltr/timeclock:7cf408f73ae75e8afe71e67ee53bafd45e970cbb-migrator
      containers:
        - name: frontend
          image: ghcr.io/haianhltr/timeclock:7cf408f73ae75e8afe71e67ee53bafd45e970cbb
          env:
            - name: NEXTAUTH_URL
              value: "https://clockin.randomstuffs.org"
