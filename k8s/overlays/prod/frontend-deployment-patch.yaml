apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  template:
    spec:
      initContainers:
        - name: prisma-migrate
          image: ghcr.io/haianhltr/timeclock:41e233a692e8b178ea2aa878a17871e873e70f07-migrator
      containers:
        - name: frontend
          image: ghcr.io/haianhltr/timeclock:41e233a692e8b178ea2aa878a17871e873e70f07
          env:
            - name: NEXTAUTH_URL
              value: "https://clockin.randomstuffs.org"
