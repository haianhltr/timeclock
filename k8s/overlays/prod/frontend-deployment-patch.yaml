apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  template:
    spec:
      initContainers:
        - name: prisma-migrate
          image: ghcr.io/haianhltr/timeclock:b5309512c1d1858323f2585523860642ddd670c5-migrator
      containers:
        - name: frontend
          image: ghcr.io/haianhltr/timeclock:b5309512c1d1858323f2585523860642ddd670c5
          env:
            - name: NEXTAUTH_URL
              value: "https://clockin.randomstuffs.org"
