apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  template:
    spec:
      initContainers:
        - name: prisma-migrate
          image: ghcr.io/haianhltr/timeclock:1d1581c602f9fd4ef3816574fbbeccbd6aabef91-migrator
      containers:
        - name: frontend
          image: ghcr.io/haianhltr/timeclock:1d1581c602f9fd4ef3816574fbbeccbd6aabef91
          env:
            - name: NEXTAUTH_URL
              value: "https://clockin.randomstuffs.org"
