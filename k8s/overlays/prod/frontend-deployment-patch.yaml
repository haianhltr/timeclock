apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  template:
    spec:
      initContainers:
        - name: prisma-migrate
          image: ghcr.io/haianhltr/timeclock:f3bd9fd64d09601dac5b36f77437b47c342fb7b7-migrator
      containers:
        - name: frontend
          image: ghcr.io/haianhltr/timeclock:f3bd9fd64d09601dac5b36f77437b47c342fb7b7
          env:
            - name: NEXTAUTH_URL
              value: "https://clockin.randomstuffs.org"
