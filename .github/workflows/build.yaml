name: Build & Deploy Prod

on:
  push:
    branches: [main]
    paths:
      - 'src/frontend/**'
      - 'k8s/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push runner image
        uses: docker/build-push-action@v5
        with:
          context: src/frontend
          file: src/frontend/Dockerfile
          target: runner
          push: true
          tags: |
            ghcr.io/haianhltr/timeclock:${{ github.sha }}
            ghcr.io/haianhltr/timeclock:latest
          cache-from: type=gha,scope=runner
          cache-to: type=gha,mode=max,scope=runner

      - name: Build & push migrator image
        uses: docker/build-push-action@v5
        with:
          context: src/frontend
          file: src/frontend/Dockerfile
          target: migrator
          push: true
          tags: |
            ghcr.io/haianhltr/timeclock:${{ github.sha }}-migrator
            ghcr.io/haianhltr/timeclock:latest-migrator
          cache-from: type=gha,scope=migrator
          cache-to: type=gha,mode=max,scope=migrator

      - name: Bump prod image tags
        run: |
          PATCH=k8s/overlays/prod/frontend-deployment-patch.yaml
          MIGRATOR=ghcr.io/haianhltr/timeclock:${{ github.sha }}-migrator
          yq -i '.spec.template.spec.containers[0].image = "ghcr.io/haianhltr/timeclock:${{ github.sha }}"' "$PATCH"
          yq -i ".spec.template.spec.initContainers[0].image = \"$MIGRATOR\"" "$PATCH"

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/prod/frontend-deployment-patch.yaml
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: bump prod image to ${{ github.sha }} [skip ci]"
          git push
