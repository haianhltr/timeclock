<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>clockin</title>
  <link rel="stylesheet" href="app/tokens.css" />
  <style>
    /* responsive shell */
    @media (max-width: 760px) {
      .sidebar { display: none !important; }
      .bottomnav { display: flex !important; }
      .topbar { display: flex !important; }
      .app-main { padding-top: 22px !important; }
      .login-wrap { grid-template-columns: 1fr !important; }
      .login-brand { min-height: 180px !important; padding: 26px 26px !important; }
      .dash-grid { grid-template-columns: 1fr !important; }
      .dash-grid section[style*="span 2"] { grid-column: auto !important; }
      .hist-mood { display: none !important; }
    }
    @media (max-width: 1040px) and (min-width: 761px) {
      .dash-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
    }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app/data.jsx"></script>
  <script type="text/babel" src="app/charts.jsx"></script>
  <script type="text/babel" src="app/auth.jsx"></script>
  <script type="text/babel" src="app/entry.jsx"></script>
  <script type="text/babel" src="app/dashboard.jsx"></script>
  <script type="text/babel" src="app/main.jsx"></script>
</body>
</html>
